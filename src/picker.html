<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Share Your Screen</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background: #1a1a1a;
        color: #e0e0e0;
        overflow-y: auto;
        user-select: none;
      }

      .header {
        padding: 16px 24px 12px;
        position: sticky;
        top: 0;
        background: #1a1a1a;
        z-index: 10;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
      }

      .header-text h1 {
        font-size: 18px;
        font-weight: 600;
        color: #ffffff;
        margin-bottom: 4px;
      }

      .header-text p {
        font-size: 13px;
        color: #888;
      }

      .btn-close {
        width: 28px;
        height: 28px;
        border: none;
        border-radius: 6px;
        background: transparent;
        color: #888;
        font-size: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition:
          background 0.15s,
          color 0.15s;
        line-height: 1;
      }

      .btn-close:hover {
        background: #333;
        color: #e0e0e0;
      }

      .section {
        padding: 8px 24px 16px;
      }

      .section-title {
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #888;
        margin-bottom: 12px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 12px;
      }

      .source {
        background: #252525;
        border: 2px solid transparent;
        border-radius: 8px;
        cursor: pointer;
        overflow: hidden;
        transition:
          border-color 0.15s,
          background 0.15s;
      }

      .source:hover {
        border-color: #4a9eff;
        background: #2a2a2a;
      }

      .source:active {
        background: #333;
      }

      .source .thumbnail {
        width: 100%;
        aspect-ratio: 16 / 10;
        object-fit: contain;
        background: #111;
        display: block;
      }

      .source .thumbnail-placeholder {
        width: 100%;
        aspect-ratio: 16 / 10;
        background: #111;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #555;
        font-size: 32px;
      }

      .source .name {
        padding: 8px 10px;
        font-size: 12px;
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: #ccc;
      }

      .actions {
        padding: 12px 24px 20px;
        display: flex;
        justify-content: flex-end;
        position: sticky;
        bottom: 0;
        background: #1a1a1a;
      }

      .btn-cancel {
        padding: 8px 20px;
        border: 1px solid #444;
        border-radius: 6px;
        background: transparent;
        color: #ccc;
        font-size: 13px;
        cursor: pointer;
        transition:
          background 0.15s,
          border-color 0.15s;
      }

      .btn-cancel:hover {
        background: #333;
        border-color: #666;
      }

      .status {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 60px 24px;
        color: #888;
        font-size: 14px;
        text-align: center;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="header-text">
        <h1>Share Your Screen</h1>
        <p>Choose a screen or window to share</p>
      </div>
      <button class="btn-close" id="close-btn" title="Close">&times;</button>
    </div>

    <div id="content">
      <div class="status">Loading sources...</div>
    </div>

    <div class="actions">
      <button class="btn-cancel" id="cancel-btn">Cancel</button>
    </div>

    <script>
      (async () => {
        const content = document.getElementById("content");
        const cancelBtn = document.getElementById("cancel-btn");
        const closeBtn = document.getElementById("close-btn");

        const doCancel = () => window.screenPicker.cancel();

        cancelBtn.addEventListener("click", doCancel);
        closeBtn.addEventListener("click", doCancel);

        document.addEventListener("keydown", (e) => {
          if (e.key === "Escape") doCancel();
        });

        function renderThumbnail(source) {
          if (source.thumbnail) {
            return `<img class="thumbnail" src="${source.thumbnail}" alt="${source.name}" />`;
          }
          // Placeholder icon for sources without thumbnails
          const icon = source.id.startsWith("screen:") ? "&#9634;" : "&#9635;";
          return `<div class="thumbnail-placeholder">${icon}</div>`;
        }

        function renderSection(title, sources) {
          if (sources.length === 0) return "";
          let html = '<div class="section">';
          html += `<div class="section-title">${title}</div>`;
          html += '<div class="grid">';
          for (const source of sources) {
            html += `
              <div class="source" data-id="${source.id}">
                ${renderThumbnail(source)}
                <div class="name" title="${source.name}">${source.name}</div>
              </div>
            `;
          }
          html += "</div></div>";
          return html;
        }

        try {
          const sources = await window.screenPicker.getSources();

          const screens = sources.filter((s) => s.id.startsWith("screen:"));
          const windows = sources.filter((s) => s.id.startsWith("window:"));

          if (screens.length === 0 && windows.length === 0) {
            content.innerHTML =
              '<div class="status">' +
              "<div>" +
              '<div style="font-size: 16px; margin-bottom: 8px; color: #e0e0e0;">No screens or windows found</div>' +
              '<div style="font-size: 13px; color: #888;">This usually means Screen Recording permission has not been granted.<br>' +
              "Go to <strong>System Settings &gt; Privacy &amp; Security &gt; Screen Recording</strong>,<br>" +
              "enable this app, then restart it.</div>" +
              "</div></div>";
            return;
          }

          content.innerHTML =
            renderSection("Screens", screens) +
            renderSection("Windows", windows);

          document.querySelectorAll(".source").forEach((el) => {
            el.addEventListener("click", () => {
              window.screenPicker.selectSource(el.getAttribute("data-id"));
            });
          });
        } catch (err) {
          content.innerHTML = `<div class="status">Error loading sources: ${err.message}</div>`;
        }
      })();
    </script>
  </body>
</html>
