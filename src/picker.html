<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Share Your Screen</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        background: #1a1a1a;
        color: #e0e0e0;
        overflow-y: auto;
        user-select: none;
      }

      .header {
        padding: 20px 24px 12px;
        position: sticky;
        top: 0;
        background: #1a1a1a;
        z-index: 10;
      }

      .header h1 {
        font-size: 18px;
        font-weight: 600;
        color: #ffffff;
        margin-bottom: 4px;
      }

      .header p {
        font-size: 13px;
        color: #888;
      }

      .section {
        padding: 8px 24px 16px;
      }

      .section-title {
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #888;
        margin-bottom: 12px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 12px;
      }

      .source {
        background: #252525;
        border: 2px solid transparent;
        border-radius: 8px;
        cursor: pointer;
        overflow: hidden;
        transition: border-color 0.15s, background 0.15s;
      }

      .source:hover {
        border-color: #4a9eff;
        background: #2a2a2a;
      }

      .source:active {
        background: #333;
      }

      .source .thumbnail {
        width: 100%;
        aspect-ratio: 16 / 10;
        object-fit: contain;
        background: #111;
        display: block;
      }

      .source .name {
        padding: 8px 10px;
        font-size: 12px;
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: #ccc;
      }

      .actions {
        padding: 12px 24px 20px;
        display: flex;
        justify-content: flex-end;
        position: sticky;
        bottom: 0;
        background: #1a1a1a;
      }

      .btn-cancel {
        padding: 8px 20px;
        border: 1px solid #444;
        border-radius: 6px;
        background: transparent;
        color: #ccc;
        font-size: 13px;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
      }

      .btn-cancel:hover {
        background: #333;
        border-color: #666;
      }

      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 60px 24px;
        color: #888;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>Share Your Screen</h1>
      <p>Choose a screen or window to share</p>
    </div>

    <div id="content">
      <div class="loading">Loading sources...</div>
    </div>

    <div class="actions">
      <button class="btn-cancel" id="cancel-btn">Cancel</button>
    </div>

    <script>
      (async () => {
        const content = document.getElementById("content");
        const cancelBtn = document.getElementById("cancel-btn");

        cancelBtn.addEventListener("click", () => {
          window.screenPicker.cancel();
        });

        // Escape key to cancel
        document.addEventListener("keydown", (e) => {
          if (e.key === "Escape") {
            window.screenPicker.cancel();
          }
        });

        try {
          const sources = await window.screenPicker.getSources();

          const screens = sources.filter((s) => s.id.startsWith("screen:"));
          const windows = sources.filter((s) => s.id.startsWith("window:"));

          let html = "";

          if (screens.length > 0) {
            html += '<div class="section">';
            html += '<div class="section-title">Screens</div>';
            html += '<div class="grid">';
            for (const source of screens) {
              html += `
                <div class="source" data-id="${source.id}">
                  <img class="thumbnail" src="${source.thumbnail}" alt="${source.name}" />
                  <div class="name" title="${source.name}">${source.name}</div>
                </div>
              `;
            }
            html += "</div></div>";
          }

          if (windows.length > 0) {
            html += '<div class="section">';
            html += '<div class="section-title">Windows</div>';
            html += '<div class="grid">';
            for (const source of windows) {
              html += `
                <div class="source" data-id="${source.id}">
                  <img class="thumbnail" src="${source.thumbnail}" alt="${source.name}" />
                  <div class="name" title="${source.name}">${source.name}</div>
                </div>
              `;
            }
            html += "</div></div>";
          }

          if (screens.length === 0 && windows.length === 0) {
            html =
              '<div class="loading">No screens or windows available to share.</div>';
          }

          content.innerHTML = html;

          // Attach click handlers
          document.querySelectorAll(".source").forEach((el) => {
            el.addEventListener("click", () => {
              const sourceId = el.getAttribute("data-id");
              window.screenPicker.selectSource(sourceId);
            });
          });
        } catch (err) {
          content.innerHTML = `<div class="loading">Error loading sources: ${err.message}</div>`;
        }
      })();
    </script>
  </body>
</html>
